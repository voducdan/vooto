name: vocab-bot

on:
  schedule:
    # Every 2 hours during Vietnam (UTC+7) waking hours: 07, 09, 11, 13, 15, 17, 19, 21 VN
    - cron: '0 0-14/2 * * *'
  workflow_dispatch:

concurrency:
  group: vocab-bot
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run bot
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python -m bot.run

      - name: Commit state
        if: always()
        run: |
          git config user.name "vocab-bot"
          git config user.email "vocab-bot@users.noreply.github.com"
          git add state/
          if git diff --quiet --cached; then
            echo "no state changes"
          else
            git commit -m "state: $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
